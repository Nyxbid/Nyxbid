services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file: .env
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:8080}
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      # Bake the *browser* URL into the Next bundle at build time. This
      # is what the user's browser hits, so it must be reachable from
      # outside Docker (the host machine).
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        - NEXT_PUBLIC_SOLANA_RPC_URL=${NEXT_PUBLIC_SOLANA_RPC_URL:-https://api.devnet.solana.com}
    ports:
      - "${CLIENT_PORT:-3000}:3000"
    depends_on:
      - server
    environment:
      # Server-side fetches inside the client container go to the
      # `server` service over Docker DNS. NEXT_PUBLIC_API_URL is for
      # the browser only; INTERNAL_API_URL is for Next SSR.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      - INTERNAL_API_URL=http://server:8080
      - NEXT_PUBLIC_SOLANA_RPC_URL=${NEXT_PUBLIC_SOLANA_RPC_URL:-https://api.devnet.solana.com}
    restart: unless-stopped
